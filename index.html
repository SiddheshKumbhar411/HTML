<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>
<body>
    <table border="1" cellspacing="0" cellpadding="5" >
        <caption>Fruit</caption>
        <thead>
            <tr>
                <th>Sno</th>
                <th>Fruit name</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td >Mango</td>
                <td>100</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Litchi</td>
                <td>200</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Pineapple</td>
                <td>600</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>total price</td>
                <td></td>
                <td>900</td>
            </tr>
        </tfoot>
    </table>
    
</body>
</html>
